<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V2EX</title>
    <link rel="stylesheet" href="<%= contextPath %>/html/common.css" />
    <link
      rel="stylesheet"
      href="<%= contextPath %>/html/lib/codicon.css"
      id="vscode-codicon-stylesheet"
    />
    <link rel="stylesheet" href="<%= contextPath %>/html/main.css" />
  </head>

  <body>
    <div id="app">
      <div class="main-container" @contextmenu.prevent>
        <vscode-tabs :selected-index="selectedIndex" @vsc-tabs-select="onTabChange">
          <vscode-tab-header slot="header">首页</vscode-tab-header>
          <vscode-tab-panel>
            <vscode-scrollable>
              <vscode-tree indent="4">
                <template v-if="tabs.explore.length">
                  <vscode-tree-item
                    v-for="node in tabs.explore"
                    :key="'explore-' + node.id"
                    branch
                    @click.capture="onNodeClick('explore', node, $event)"
                  >
                    <span>{{ node.label }}</span>
                    <vscode-icon
                      slot="actions"
                      name="refresh"
                      :class="{ 'refresh-icon-loading': node.loading }"
                      @click.stop="refreshNode('explore', node)"
                      title="刷新"
                    ></vscode-icon>
                    <template v-if="node.loading && !node.children">
                      <vscode-tree-item>
                        <vscode-progress-ring></vscode-progress-ring>
                        <span class="loading-text">加载中⋯</span>
                      </vscode-tree-item>
                    </template>
                    <template v-else-if="node.children && node.children.length">
                      <vscode-tree-item
                        v-for="topic in node.children"
                        :key="topic.id"
                        @click.capture="openTopic(topic)"
                        @contextmenu.capture="onContextMenu(topic, $event)"
                      >
                        <span class="topic-title">{{ topic.title }}</span>
                        <span slot="decoration">
                          <vscode-badge v-if="topic.replies > 0" variant="counter">
                            {{ topic.replies }}
                          </vscode-badge>
                        </span>
                      </vscode-tree-item>
                    </template>
                    <vscode-tree-item
                      v-else-if="node.children && !node.children.length && node.error"
                    >
                      <span class="error-text">{{ node.error }}</span>
                    </vscode-tree-item>
                  </vscode-tree-item>
                </template>
                <vscode-tree-item v-else>{{ getEmptyText('explore') }}</vscode-tree-item>
              </vscode-tree>
            </vscode-scrollable>
          </vscode-tab-panel>

          <vscode-tab-header slot="header">自定义</vscode-tab-header>
          <vscode-tab-panel>
            <vscode-scrollable>
              <vscode-tree indent="4">
                <template v-if="tabs.custom.length">
                  <vscode-tree-item
                    v-for="node in tabs.custom"
                    :key="'custom-' + node.id"
                    branch
                    @click.capture="onNodeClick('custom', node, $event)"
                  >
                    <span>{{ node.label }}</span>
                    <vscode-icon
                      slot="actions"
                      name="trash"
                      @click.stop="removeNode(node)"
                      title="删除"
                    ></vscode-icon>
                    <vscode-icon
                      slot="actions"
                      name="refresh"
                      :class="{ 'refresh-icon-loading': node.loading }"
                      @click.stop="refreshNode('custom', node)"
                      title="刷新"
                    ></vscode-icon>
                    <template v-if="node.loading && !node.children">
                      <vscode-tree-item>
                        <vscode-progress-ring></vscode-progress-ring>
                        <span class="loading-text">加载中⋯</span>
                      </vscode-tree-item>
                    </template>
                    <template v-else-if="node.children && node.children.length">
                      <vscode-tree-item
                        v-for="topic in node.children"
                        :key="topic.id"
                        @click.capture="openTopic(topic)"
                        @contextmenu.capture="onContextMenu(topic, $event)"
                      >
                        <span class="topic-title">{{ topic.title }}</span>
                        <span slot="decoration">
                          <vscode-badge v-if="topic.replies > 0" variant="counter">
                            {{ topic.replies }}
                          </vscode-badge>
                        </span>
                      </vscode-tree-item>
                    </template>
                    <vscode-tree-item
                      v-else-if="node.children && !node.children.length && node.error"
                    >
                      <span class="error-text">{{ node.error }}</span>
                    </vscode-tree-item>
                  </vscode-tree-item>
                </template>
                <vscode-tree-item v-else>{{ getEmptyText('custom') }}</vscode-tree-item>
              </vscode-tree>
              <vscode-button icon="add" class="add-node-btn" @click="addNode">添加节点</vscode-button>
            </vscode-scrollable>
          </vscode-tab-panel>

          <vscode-tab-header slot="header">收藏节点</vscode-tab-header>
          <vscode-tab-panel>
            <vscode-scrollable>
              <vscode-tree indent="4">
                <template v-if="tabs.collection.length">
                  <vscode-tree-item
                    v-for="node in tabs.collection"
                    :key="'collection-' + node.id"
                    branch
                    @click.capture="onNodeClick('collection', node, $event)"
                  >
                    <span>{{ node.label }}</span>
                    <vscode-icon
                      slot="actions"
                      name="refresh"
                      :class="{ 'refresh-icon-loading': node.loading }"
                      @click.stop="refreshNode('collection', node)"
                      title="刷新"
                    ></vscode-icon>
                    <template v-if="node.loading && !node.children">
                      <vscode-tree-item>
                        <vscode-progress-ring></vscode-progress-ring>
                        <span class="loading-text">加载中⋯</span>
                      </vscode-tree-item>
                    </template>
                    <template v-else-if="node.children && node.children.length">
                      <vscode-tree-item
                        v-for="topic in node.children"
                        :key="topic.id"
                        @click.capture="openTopic(topic)"
                        @contextmenu.capture="onContextMenu(topic, $event)"
                      >
                        <span class="topic-title">{{ topic.title }}</span>
                        <span slot="decoration">
                          <vscode-badge v-if="topic.replies > 0" variant="counter">
                            {{ topic.replies }}
                          </vscode-badge>
                        </span>
                      </vscode-tree-item>
                    </template>
                    <vscode-tree-item
                      v-else-if="node.children && !node.children.length && node.error"
                    >
                      <span class="error-text">{{ node.error }}</span>
                    </vscode-tree-item>
                  </vscode-tree-item>
                </template>
                <vscode-tree-item v-else>
                  <span v-if="!loggedIn" @click="login">还未登录，请先登录</span>
                  <template v-else>{{ getEmptyText('collection') }}</template>
                </vscode-tree-item>
              </vscode-tree>
            </vscode-scrollable>
          </vscode-tab-panel>
        </vscode-tabs>
        <div v-if="ctxMenu.show" class="ctx-menu-overlay" @click.self="closeContextMenu">
          <vscode-context-menu
            class="ctx-menu"
            :style="{ left: ctxMenu.x + 'px', top: ctxMenu.y + 'px' }"
            :show="ctxMenu.show"
            :data="ctxMenu.items"
            @vsc-context-menu-select="onContextMenuSelect"
          ></vscode-context-menu>
        </div>
      </div>
    </div>

    <script src="<%= contextPath %>/html/lib/vue.global.prod.js"></script>
    <script type="module" src="<%= contextPath %>/html/lib/vscode-elements.js"></script>
    <script type="module" src="<%= contextPath %>/html/main.js"></script>
  </body>
</html>
